      <div id="lightbox" class="lightbox-modal">
        <span class="lb-close">&times;</span>
        <span class="lb-prev">&#10094;</span>
        <span class="lb-next">&#10095;</span>
        <img id="lightbox-img" src="" alt="Zvětšená fotka">
      </div>
</main>

<script>
    const images = document.querySelectorAll('.foto img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    let currentIndex = 0;

    function openLightbox(index) {
        currentIndex = index;
        lightboxImg.src = images[currentIndex].src;
        lightbox.classList.add('active');
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        // Profi trik: po zavření vymažeme fotku z paměti, ať se web neseká
        setTimeout(() => { lightboxImg.src = ''; }, 300); 
    }

    function changeImage(direction, e) {
        if (e) e.stopPropagation();
        currentIndex = (currentIndex + direction + images.length) % images.length;
        lightboxImg.src = images[currentIndex].src;
    }

    images.forEach((img, index) => {
        img.addEventListener('click', () => openLightbox(index));
    });

    document.querySelector('.lb-close').addEventListener('click', closeLightbox);
    document.querySelector('.lb-prev').addEventListener('click', (e) => changeImage(-1, e));
    document.querySelector('.lb-next').addEventListener('click', (e) => changeImage(1, e));

    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'ArrowRight') changeImage(1);
        if (e.key === 'ArrowLeft') changeImage(-1);
        if (e.key === 'Escape') closeLightbox();
    });
</script>
